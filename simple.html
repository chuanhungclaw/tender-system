<!DOCTYPE html>
<html>
<head>
    <title>銓宏國際 AI 標案系統</title>
    <meta charset="UTF-8">
    <style>
        body{font-family:Arial;background:#667eea;color:white;text-align:center;padding:50px;}
        .box{background:rgba(255,255,255,0.1);padding:40px;border-radius:20px;max-width:600px;margin:0 auto;}
        h1{margin:0 0 20px;}
        .ok{background:#4CAF50;padding:15px;border-radius:10px;margin:20px 0;}
    </style>
</head>
<body>
    <div class="box">
        <h1>🚀 銓宏國際 AI 標案系統</h1>
        <div class="ok">✅ 系統已上線！</div>
        <p>自動化標案搜索 + AI 智能分析</p>
        <p>部署時間: <span id="t"></span></p>
    </div>
    <script>document.getElementById('t').textContent=new Date().toLocaleString('zh-TW')</script>
</body>
</html>
