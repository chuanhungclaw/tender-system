# Netlify 配置文件

[build]
  # 設定構建目錄
  base = "web"
  
  # 構建命令
  command = "npm run build"
  
  # 發布目錄
  publish = ".next"

# 環境變數
[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Next.js 插件
[[plugins]]
  package = "@netlify/plugin-nextjs"

# 重定向規則（可選）
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
