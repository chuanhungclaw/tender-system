# Netlify 配置文件

[build]
  # 設定構建目錄
  base = "web"
  
  # 構建命令
  command = "npm run build"
  
  # 發布目錄（Next.js 不需要設定，Netlify 會自動處理）
  publish = ".next"

# 環境變數
[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

# Next.js 插件（必須）
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Next.js 設定
[functions]
  node_bundler = "esbuild"
