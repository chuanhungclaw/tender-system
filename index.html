<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銓宏國際 AI 標案系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2.5em;
            margin: 0 0 20px;
        }
        .success {
            background: #4CAF50;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.2em;
            font-weight: bold;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        .feature {
            background: rgba(255,255,255,0.15);
            padding: 15px;
            border-radius: 10px;
        }
        .info {
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 銓宏國際 AI 標案系統</h1>
        
        <div class="success">
            ✅ GitHub Pages 部署成功！
        </div>
        
        <p><strong>功能特色：</strong></p>
        
        <div class="features">
            <div class="feature">
                <h3>🤖 自動搜索</h3>
                <p>每日自動搜索標案</p>
            </div>
            <div class="feature">
                <h3>📊 AI 分析</h3>
                <p>智能分析與報價建議</p>
            </div>
            <div class="feature">
                <h3>📱 即時推送</h3>
                <p>Telegram 每日推送</p>
            </div>
            <div class="feature">
                <h3>👥 CRM 管理</h3>
                <p>客戶關係管理</p>
            </div>
        </div>
        
        <p><strong>部署時間：</strong> <span id="timestamp"></span></p>
        
        <div class="info">
            <p>技術棧：GitHub Pages + 靜態 HTML</p>
            <p>狀態：✅ 線上運行中</p>
        </div>
    </div>
    
    <script>
        document.getElementById('timestamp').textContent = new Date().toLocaleString('zh-TW');
    </script>
</body>
</html>
