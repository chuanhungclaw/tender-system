<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銓宏國際 AI 標案系統 - GitHub Pages</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            max-width: 600px;
            width: 100%;
        }
        h1 { font-size: 2.5em; margin-bottom: 20px; }
        .success {
            background: #4CAF50;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.2em;
        }
        .info {
            margin: 10px 0;
            padding: 10px;
            background: rgba(255,255,255,0.05);
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚀 銓宏國際 AI 標案系統</h1>
        <div class="success">✅ GitHub Pages 部署成功！</div>
        
        <div class="info">
            <strong>部署平台：</strong> GitHub Pages
        </div>
        
        <div class="info">
            <strong>網址：</strong> https://chuanhungclaw.github.io/tender-system/
        </div>
        
        <div class="info">
            <strong>部署時間：</strong> <span id="time"></span>
        </div>
        
        <div class="info">
            <strong>系統功能：</strong>
            <p>• 自動化標案搜索</p>
            <p>• AI 智能分析</p>
            <p>• Telegram 每日推送</p>
        </div>
    </div>
    
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-TW');
        console.log('GitHub Pages 網站載入成功');
    </script>
</body>
</html>
