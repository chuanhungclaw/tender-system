<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>銓宏國際 AI 標案系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        h1 {
            font-size: 2em;
            margin: 0 0 20px;
        }
        .success {
            background: #4CAF50;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-size: 1.2em;
        }
        .info {
            margin-top: 20px;
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 銓宏國際 AI 標案系統</h1>
        <div class="success">✅ 系統已上線！</div>
        <p>自動化標案搜索 + AI 智能分析 + Telegram 每日推送</p>
        <p><strong>部署時間：</strong> <span id="time"></span></p>
        <div class="info">
            <p>技術棧：Next.js + Supabase + GitHub Pages</p>
            <p>狀態：✅ 線上運行中</p>
        </div>
    </div>
    <script>
        document.getElementById('time').textContent = new Date().toLocaleString('zh-TW');
    </script>
</body>
</html>
